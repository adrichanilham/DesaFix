<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>DesaFix Offline</title>
    <style>
      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        margin: 0;
        background: #f7f7f2;
        color: #17312f;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100% - 40px, 520px);
      }

      h1 {
        margin: 0;
        font-size: 2rem;
      }

      p {
        color: #47615e;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        border-radius: 8px;
        background: #0f766e;
        color: #ffffff;
        font-weight: 800;
        padding: 12px 14px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DesaFix sedang offline</h1>
      <p>
        Koneksi internet tidak tersedia. Beberapa halaman yang sudah pernah dibuka
        mungkin tetap bisa diakses, lalu data akan diperbarui saat online kembali.
      </p>
      <a href="/">Coba lagi</a>
    </main>
  </body>
</html>
